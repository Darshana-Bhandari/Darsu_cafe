<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome To Darsu food cafe</title>
    <link rel="stylesheet" href="css/login.css">
    <script src="javascript/login.js?v=2" defer></script>
</head>
<body>
    <div class="login">
        <img src="images/WhatsApp Image 2026-06-03 at 18.28.03.jpeg" alt="Food Background" class="login-image">
        <h2>Welcome Back Cuties!</h2> 
        <p>To keep connected with us, login with your info.</p>        
    </div>

    <div class="role-section">
        <p class="role-title">Select Role</p>
        
        <div class="role-buttons">
            <button type="button" class="role-btn active" data-role="Admin">Admin</button>
            <button type="button" class="role-btn" data-role="Member">Member</button>
            <button type="button" class="role-btn" data-role="Visitor">Visitor</button>
        </div>

        <form class="login-form" id="loginForm">
            <input type="hidden" id="role" name="role" value="Admin">
            
            <label>Email Address</label>
            <input type="email" id="username" placeholder="Enter your email" required>

            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>

            <p onclick="window.location.href='forgot-password.html'" style="cursor: pointer;">
                Forgot Password?
            </p>
            
            <button type="submit">Sign In</button>
            
            <h3 class="sanu"> or </h3>
            <button type="button">Sign in with Google</button>
            
            <h3 class="pukulu" onclick="window.location.href='register.html'" style="cursor: pointer;">
                Don't have an account? Register
            </h3>
        </form>
    </div>
</body>
</html>
