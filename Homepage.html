<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomePage</title>
    <link rel="stylesheet" href="css/homepage.css">
</head>
<body>
    <header class="bistro-header">
  <!-- Top Row: Text and Profile Picture -->
  <div class="header-top-row">
    <div class="header-text">
      <span class="greeting">Good Evening, Darshana 👋</span>
      <h1 class="brand-name">Darsu Food Cafe</h1>
      <span class="location">Belbari-3 Morang, Nepal</span>
    </div>
    
    <div class="profile-avatar">
      <!-- You can replace this emoji/text with an <img> tag later -->
      <span class="avatar-icon">👤</span>
    </div>
  </div>

  <div class="search-container">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Search food, tables..." class="search-input">
  </div>
</header>
 
</body>
</html>
